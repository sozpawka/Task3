<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Канбан доска</title>
	<link rel="stylesheet" href="css/style.css">
	<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
	<script defer src="js/main.js"></script>
</head>
<body>
	<div id="app">
		<h1 class="board-title">Канбан доска</h1>
		<task-modal v-if="showModal" :task="newTask" @close="closeModal" @save="saveTask"></task-modal>
		<div class="board">
			<task-column 
                title="Запланированные задачи" 
                :tasks="tasks.planned" 
                @edit="editTask" 
                @delete="deleteTask" 
                @move="moveToProgress" 
                :show-add-btn="true"
                @open-modal="openModal">
            </task-column>
			<task-column 
				title="Задачи в работе" 
				:tasks="tasks.progress" 
				@edit="editProgressTask" 
				@move="moveToTesting">
			</task-column>
			<task-column 
				title="Тестирование" 
				:tasks="tasks.testing" 
				@edit="editTestingTask" 
				@move-to-done="moveToDone" 
				@return-to-progress="returnToProgress">
			</task-column>
            <task-column 
                title="Выполненные задачи" 
                :tasks="tasks.done" 
                :is-done="true">
            </task-column>
		</div>
	</div>
</body>
</html>
